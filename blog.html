<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог об AI и автоматизации | ChatBot24 Studio</title>
    <meta name="description" content="Полезные материалы о чат-ботах, искусственном интеллекте и автоматизации бизнес-процессов">
    <link rel="canonical" href="https://www.chatbot24.su/blog.html">
    <link rel="alternate" hreflang="ru" href="https://www.chatbot24.su/blog.html">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="icon" type="image/svg+xml" sizes="32x32" href="/assets/favicon-32x32.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.svg">
    <link rel="manifest" href="/assets/site.webmanifest">
    <meta name="theme-color" content="#0f0f1a">
    <link rel="preconnect" href="https://mc.yandex.ru">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .blog-header { padding: 120px 0 60px; text-align: center; }
        .blog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; padding-bottom: 100px; }
        .blog-card { background: var(--color-card-bg); backdrop-filter: blur(10px); border: 1px solid var(--color-card-border); border-radius: 16px; overflow: hidden; transition: all 0.3s ease; }
        .blog-card:hover { transform: translateY(-4px); border-color: var(--color-accent-start); }
        .blog-image { height: 200px; background: linear-gradient(135deg, var(--color-accent-start), var(--color-accent-end)); display: flex; align-items: center; justify-content: center; font-size: 64px; }
        .blog-content { padding: 24px; }
        .blog-date { font-size: 13px; color: var(--color-text-muted); margin-bottom: 8px; }
        .blog-title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
        .blog-excerpt { font-size: 15px; color: var(--color-text-secondary); margin-bottom: 16px; }
        .breadcrumb { display: flex; gap: 8px; align-items: center; font-size: 14px; color: var(--color-text-muted); margin-bottom: 24px; }
        .breadcrumb a { color: var(--color-text-secondary); text-decoration: none; }
        .breadcrumb a:hover { color: white; }
        @media (max-width: 1024px) { .blog-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .blog-grid { grid-template-columns: 1fr; } }
    </style>
