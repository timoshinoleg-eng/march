<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c46"/>
      <stop offset="50%" style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#231e30"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <rect x="3" y="3" width="174" height="174" rx="37" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.5" filter="url(#glow)"/>
  
  <g transform="translate(90, 90)">
    <rect x="-36" y="-40" width="72" height="58" rx="18" fill="url(#accent)"/>
    <line x1="0" y1="-40" x2="0" y2="-58" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="-62" r="5" fill="#ec4899" filter="url(#glow)"/>
    
    <circle cx="-18" cy="-22" r="7" fill="white"/>
    <circle cx="18" cy="-22" r="7" fill="white"/>
    
    <rect x="-27" y="22" width="54" height="36" rx="10" fill="white" opacity="0.95"/>
    <circle cx="22" cy="40" r="5" fill="#10b981" filter="url(#glow)"/>
  </g>
</svg>